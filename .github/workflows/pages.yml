name: Publicar no GitHub Pages
on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validar workflow de correções de qualidade
        run: python3 scripts/validate_quality_correction_plan.py
      - name: Validar fila de candidatos
        run: python3 scripts/validate_candidate_queue.py
      - name: Validar catálogo de produtos
        run: python3 scripts/validate_product_catalog.py
      - name: Validar CSV e gerar artefatos
        run: python3 scripts/build_catalog.py
      - name: Auditar papéis dos links
        run: python3 scripts/audit_link_roles.py
      - name: Validar proposta de esquema
        run: python3 scripts/validate_schema_draft.py
      - name: Validar matriz de migração DATA1-B
        run: python3 scripts/validate_migration_matrix.py
      - name: Validar complemento DATA1-BX
        run: |
          python3 scripts/validate_data1bx_matrix.py
          python3 scripts/load_data1bx_from_canonical.py
      - name: Validar lotes de revisão DATA1-BR
        run: |
          python3 scripts/validate_br_batches.py
          python3 scripts/validate_br_completion.py
      - name: Validar fechamento e evidências externas
        run: |
          python3 scripts/validate_external_review_evidence.py
          python3 scripts/validate_external_review_queue.py
      - name: Validar objetivos finais e prontidão para DOI
        run: python3 scripts/validate_doi_readiness.py
      - name: Validar interface estática
        run: |
          python3 scripts/validate_frontend.py
          node --check assets/app.js
          node --check assets/analytics.js
          node --check assets/build-meta.js
  deploy:
    if: github.event_name != 'pull_request'
    needs: validate
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Gerar artefatos do site
        run: |
          python3 scripts/build_catalog.py
          python3 scripts/audit_link_roles.py
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4

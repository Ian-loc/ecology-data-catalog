name: Publicar no GitHub Pages
on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:
permissions:
  contents: write
  pages: write
  id-token: write
concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Materializar DATA1-BX no branch de trabalho
        if: github.event_name == 'pull_request' && github.head_ref == 'agent/health-candidates-data1bx-quality-ui'
        run: |
          python3 scripts/load_data1bx_from_canonical.py --write
          if git diff --quiet -- migration/data1bx_migration_matrix.csv; then
            echo "Matriz já materializada"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add migration/data1bx_migration_matrix.csv
            git commit -m "chore: materializar matriz DATA1-BX"
            git push origin HEAD:${{ github.head_ref }}
          fi
      - name: Validar workflow de correções de qualidade
        run: python3 scripts/validate_quality_correction_plan.py
      - name: Validar fila de candidatos
        run: python3 scripts/validate_candidate_queue.py
      - name: Validar CSV e gerar artefatos
        run: python3 scripts/build_catalog.py
      - name: Validar proposta de esquema
        run: python3 scripts/validate_schema_draft.py
      - name: Validar matriz de migração DATA1-B
        run: python3 scripts/validate_migration_matrix.py
      - name: Validar complemento DATA1-BX
        run: python3 scripts/validate_data1bx_matrix.py
      - name: Validar objetivos finais e prontidão para DOI
        run: python3 scripts/validate_doi_readiness.py
      - name: Validar interface estática
        run: |
          python3 scripts/validate_frontend.py
          node --check assets/app.js
          node --check assets/analytics.js
          node --check assets/build-meta.js
  deploy:
    if: github.event_name != 'pull_request'
    needs: validate
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Gerar artefatos do site
        run: python3 scripts/build_catalog.py
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4

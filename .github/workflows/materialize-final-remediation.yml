name: Materializar remediação final
on:
  pull_request:
    types: [opened, reopened]
permissions:
  contents: write
concurrency:
  group: materialize-final-remediation-${{ github.event.pull_request.number }}
  cancel-in-progress: false
jobs:
  materialize:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - name: Aplicar correções e sincronizar projeções
        run: |
          python3 -m py_compile scripts/apply_factual_remediation.py
          python3 scripts/apply_factual_remediation.py
          python3 scripts/load_data1bx_from_canonical.py --write
          python3 scripts/apply_factual_remediation.py --check
          python3 scripts/validate_data1bx_matrix.py
          python3 scripts/load_data1bx_from_canonical.py
      - name: Consolidar na branch do pull request
        run: |
          rm -f .github/workflows/materialize-final-remediation.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --cached --quiet; then
            echo "Nenhuma alteração pendente."
          else
            git commit -m "fix: materialize factual remediation and compact UI"
            git push origin HEAD:${{ github.event.pull_request.head.ref }}
          fi

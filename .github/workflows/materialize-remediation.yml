name: Materializar correções factuais
on:
  pull_request:
    types: [opened, reopened]
  workflow_dispatch:
permissions:
  contents: write
concurrency:
  group: materialize-factual-remediation-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: false
jobs:
  materialize:
    if: github.event_name == 'workflow_dispatch' || github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref || 'main' }}
          fetch-depth: 0
      - name: Aplicar e conferir correções
        run: |
          python3 -m py_compile scripts/apply_factual_remediation.py
          python3 scripts/apply_factual_remediation.py
          python3 scripts/apply_factual_remediation.py --check
      - name: Consolidar na branch do pull request
        if: github.event_name == 'pull_request'
        run: |
          rm -f .github/workflows/materialize-remediation.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "fix: materialize factual corrections and compact UI"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}

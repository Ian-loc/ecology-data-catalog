name: Materializar correções factuais
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: write
concurrency:
  group: materialize-factual-remediation
  cancel-in-progress: false
jobs:
  materialize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Aplicar e conferir correções
        run: |
          python3 -m py_compile scripts/apply_factual_remediation.py
          python3 scripts/apply_factual_remediation.py
          python3 scripts/apply_factual_remediation.py --check
      - name: Preparar branch de integração
        run: |
          rm .github/workflows/materialize-remediation.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git switch -c bot/materialized-factual-remediation-20260723
          git add .
          git commit -m "fix: materialize factual corrections and compact UI"
          git push origin HEAD:bot/materialized-factual-remediation-20260723

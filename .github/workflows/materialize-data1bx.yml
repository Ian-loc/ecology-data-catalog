name: Materializar DATA1-BX
on:
  push:
    branches: ["agent/health-candidates-data1bx-quality-ui"]
permissions:
  contents: write
jobs:
  materialize:
    if: ${{ !contains(github.event.head_commit.message, 'materializar matriz DATA1-BX') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/health-candidates-data1bx-quality-ui
      - name: Gerar matriz a partir do CSV canônico
        run: python3 scripts/load_data1bx_from_canonical.py --write
      - name: Registrar matriz materializada
        run: |
          if git diff --quiet -- migration/data1bx_migration_matrix.csv; then
            echo "Matriz já materializada"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add migration/data1bx_migration_matrix.csv
          git commit -m "chore: materializar matriz DATA1-BX"
          git push origin HEAD:agent/health-candidates-data1bx-quality-ui
